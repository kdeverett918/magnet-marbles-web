# Render Blueprint — Magnet Marbles web build (static site, auto-deploy from main)
services:
  - type: web
    runtime: static
    name: magnet-marbles
    repo: https://github.com/kdeverett918/magnet-marbles-web
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
